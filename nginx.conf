# Static-site config for Obliquity (the Earth rotation simulator).
# The Vite build uses base './' so every asset path is relative, which means this
# works served from the domain root or from behind a reverse-proxy subpath alike.
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text payloads. The build pre-compresses every asset to .gz (gzip level 9) and
    # .br (brotli q11); gzip_static serves those directly so we never recompress per request.
    # gzip on (level 6) is the fallback for anything that arrives without a precompressed twin.
    # Brotli serving would need the ngx_brotli module (not in the stock nginx image), so the
    # shipped .br files sit ready for a brotli-capable host/CDN but are unused here.
    gzip_static     on;
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript image/svg+xml application/json;

    # Content-hashed build assets never change under a given name, so cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else: serve the file if present, otherwise fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
